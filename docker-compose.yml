version: '3.8'

services:
  aktools:
    container_name: mist-aktools
    image: ghcr.io/${REPO_OWNER:-moyui}/mist/aktools:${VERSION:-latest}
    ports:
      - "8080:8080"
    networks:
      - mist-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/docs"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 20s

  mist:
    container_name: mist-backend
    image: ghcr.io/${REPO_OWNER:-moyui}/mist:${VERSION:-latest}
    env_file:
      - .env
    ports:
      - "8001:8001"  # Main mist app
      - "8008:8008"  # Chan test entry
    environment:
      - mysql_server_host=host.docker.internal
      - AKTOOLS_BASE_URL=http://aktools:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mist-network
    volumes:
      - ./logs:/app/logs
    depends_on:
      aktools:
        condition: service_healthy
    restart: unless-stopped

  mcp-server:
    container_name: mist-mcp-server
    image: ghcr.io/${REPO_OWNER:-moyui}/mist:${VERSION:-latest}
    env_file:
      - .env
    ports:
      - "8009:8009"  # MCP server
    environment:
      - PORT=8009
      - mysql_server_host=host.docker.internal
      - AKTOOLS_BASE_URL=http://aktools:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mist-network
    depends_on:
      aktools:
        condition: service_healthy
    restart: unless-stopped
    command: ["pnpm", "run", "start:dev:mcp-server"]

networks:
  mist-network:
    driver: bridge
