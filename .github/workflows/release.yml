name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'  # 匹配 v1.0.0, v2.1.3 等语义化版本标签
  workflow_dispatch:
    inputs:
      version_type:
        description: '版本类型'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  release:
    name: Create Release and Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，用于生成 changelog
          token: ${{ secrets.GITHUB_TOKEN }}  # 需要写入权限来创建 tag

      - name: Calculate and create tag (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        id: create_tag
        run: |
          # 获取最新版本标签
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          CURRENT_VERSION=${LATEST_TAG#v}

          # 解析版本号
          IFS='.' read -ra VERSION_PARTS <<< "$CURRENT_VERSION"
          MAJOR=${VERSION_PARTS[0]:-0}
          MINOR=${VERSION_PARTS[1]:-0}
          PATCH=${VERSION_PARTS[2]:-0}

          # 根据选择的类型计算新版本
          case "${{ github.event.inputs.version_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "📦 Current version: $CURRENT_VERSION"
          echo "🚀 New version: $NEW_VERSION"

          # 创建标签
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_VERSION"
          git push origin "$NEW_TAG"

          # 输出给后续步骤使用
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: version
        run: |
          # 如果是手动触发，使用上一步骤的版本；否则从 tag 中提取
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION=${{ steps.create_tag.outputs.version }}
            TAG=${{ steps.create_tag.outputs.tag }}
          else
            # 从 GitHub_REF 中提取版本号（如 refs/tags/v1.0.0 -> 1.0.0）
            VERSION=${GITHUB_REF#refs/tags/v}
            TAG=${GITHUB_REF#refs/tags/}
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Generate Release Notes
        id: release_notes
        run: |
          # 获取上一个标签
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          # 生成 changelog
          if [ -z "$PREV_TAG" ]; then
            cat > release_notes.md << 'EOF'
          ### 首次发布

          这是 Mist Backend 的第一个稳定版本。

          ## 主要功能

          - 📊 实时股票数据采集和存储
          - 📈 164+ 技术分析指标（MACD、RSI、KDJ等）
          - 🧠 缠论（Chan Theory）自动化分析
          - 🤖 多智能体AI系统用于交易决策
          - 🔄 RESTful API with Swagger文档
          - 🔌 MCP Server for AI应用集成
          EOF
          else
            cat > release_notes.md << EOF
          ### 更新内容

          自 $PREV_TAG 以来的变更：

          $(git log ${PREV_TAG}..HEAD --oneline --format="* %s (%h)")
          EOF
          fi

          echo "" >> release_notes.md
          echo "## Docker 镜像" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "# 拉取最新版本" >> release_notes.md
          echo "docker pull ghcr.io/moyui/mist:${{ steps.version.outputs.version }}" >> release_notes.md
          echo "docker pull ghcr.io/moyui/mist:latest" >> release_notes.md
          echo '```' >> release_notes.md

          echo "" >> release_notes.md
          echo "## 快速开始" >> release_notes.md
          echo "" >> release_notes.md
          echo '```bash' >> release_notes.md
          echo "docker run -d \\" >> release_notes.md
          echo "  -p 8001:8001 \\" >> release_notes.md
          echo "  -p 8008:8008 \\" >> release_notes.md
          echo "  -e mysql_server_host=host.docker.internal \\" >> release_notes.md
          echo "  -e mysql_server_password=your_password \\" >> release_notes.md
          echo "  ghcr.io/moyui/mist:${{ steps.version.outputs.version }}" >> release_notes.md
          echo '```' >> release_notes.md

          # 显示 release notes
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Mist ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push main Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Mist Backend
            org.opencontainers.image.description=股票市场分析和预警系统
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push AKTools Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.aktools
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/aktools:latest
            ghcr.io/${{ github.repository }}/aktools:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/aktools:${{ steps.version.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Mist AKTools
            org.opencontainers.image.description=AKTools 数据源服务
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Release Summary
        run: |
          echo "### 🎉 Mist ${{ steps.version.outputs.version }} 发布成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📦 Docker 镜像标签" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 服务 | 标签 | 镜像地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| **主应用** | latest | \`ghcr.io/moyui/mist:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **主应用** | ${{ steps.version.outputs.version }} | \`ghcr.io/moyui/mist:${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AKTools** | latest | \`ghcr.io/moyui/mist/aktools:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **AKTools** | ${{ steps.version.outputs.version }} | \`ghcr.io/moyui/mist/aktools:${{ steps.version.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 🚀 使用方法" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# 1. 拉取镜像" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/moyui/mist:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ghcr.io/moyui/mist/aktools:${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 2. 使用 docker-compose 启动" >> $GITHUB_STEP_SUMMARY
          echo "VERSION=${{ steps.version.outputs.version }} docker-compose up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
